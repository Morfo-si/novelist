name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: make tidy && git diff --exit-code go.mod go.sum

      - name: Format check
        run: |
          make fmt
          git diff --exit-code

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test with coverage
        run: make test-cover

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
